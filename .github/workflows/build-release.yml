name: Build And Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            goos: windows
            goarch: amd64
            output: awan-tui-windows-amd64.exe
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            output: awan-tui-linux-amd64

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install dependencies
        run: go mod tidy

      - name: Build application
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" -o dist/${{ matrix.output }} ./cmd

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.goos }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-windows
          path: dist

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-linux
          path: dist

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: auto-${{ github.run_number }}
          RELEASE_NAME: Build ${{ github.run_number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if gh release view "$TAG_NAME" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" dist/*.exe dist/*linux* --clobber --repo "$REPO"
          else
            gh release create "$TAG_NAME" \
              dist/*.exe \
              dist/*linux* \
              --title "$RELEASE_NAME" \
              --notes "Automated build for run ${{ github.run_number }}" \
              --target "${{ github.sha }}" \
              --repo "$REPO"
          fi
